<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Psycho Hospital{% endblock %}</title>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #F3F4F6;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --card-bg: #FFFFFF;
        }
        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        header {
            background-color: var(--card-bg);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
            text-decoration: none;
        }
        nav {
            display: flex;
            gap: 1.5rem;
        }
        nav a {
            text-decoration: none;
            color: var(--text-main);
            font-weight: 500;
            transition: color 0.2s;
        }
        nav a:hover {
            color: var(--primary);
        }
        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        .card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 1.5rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            margin-bottom: 1rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .btn {
            display: inline-block;
            background-color: var(--primary);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
            transition: background-color 0.2s;
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            background-color: var(--primary-hover);
        }
        .page-title {
            margin-bottom: 1.5rem;
            color: var(--text-main);
            font-size: 2rem;
        }
    </style>
</head>
<body>

    <header>
        <a href="/" class="logo">Psycho Hospital</a>
        <nav style="display: flex; align-items: center; gap: 1.5rem;">
            <a href="{% url 'doctors:doctor_list' %}">Лікарі</a>
            <a href="{% url 'appointments:appointment_list' %}">Записи пацієнтів</a>
            
            {% if user.is_authenticated %}
                <form method="post" action="{% url 'logout' %}" style="margin: 0; padding: 0;">
                    {% csrf_token %}
                    <button type="submit" style="background: none; border: none; color: var(--text-main); font-weight: 500; cursor: pointer; padding: 0; font-family: inherit; font-size: inherit;">Вийти ({{ user.username }})</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" style="color: var(--primary); font-weight: 600;">Увійти</a>
            {% endif %}
        </nav>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
