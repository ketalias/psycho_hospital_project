{% extends 'base.html' %}

{% block title %}Увійти - Psycho Hospital{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 2rem auto; padding: 2rem;" class="card">
    <h2 style="margin-top: 0; color: var(--primary); text-align: center;">Авторизація</h2>
    
    {% if form.errors %}
        <p style="color: #DC2626; text-align: center;">Невірне ім'я користувача або пароль. Спробуйте ще раз.</p>
    {% endif %}

    <form method="post" action="{% url 'login' %}" style="display: flex; flex-direction: column; gap: 1rem;">
        {% csrf_token %}
        
        <div>
            <label for="id_username" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Ім'я користувача</label>
            <input type="text" name="username" id="id_username" required style="width: 100%; padding: 0.5rem; border: 1px solid #D1D5DB; border-radius: 6px; box-sizing: border-box;">
        </div>
        
        <div>
            <label for="id_password" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Пароль</label>
            <input type="password" name="password" id="id_password" required style="width: 100%; padding: 0.5rem; border: 1px solid #D1D5DB; border-radius: 6px; box-sizing: border-box;">
        </div>

        <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Увійти</button>
        <input type="hidden" name="next" value="{{ next|default:'/' }}">
    </form>
</div>
{% endblock %}
